<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200">
  <defs>
    <style>
      .peacock { fill: none; stroke: #3D1F0D; stroke-linecap: round; stroke-linejoin: round; }
      .pfill { fill: #3D1F0D; }
      .pgold { fill: #C9960C; }
    </style>
  </defs>

  <!-- Tail feathers spreading upward and to the right -->
  <!-- Outer feather arcs -->
  <path class="peacock" stroke-width="1.2"
    d="M70,160 C90,130 120,100 140,60"/>
  <path class="peacock" stroke-width="1.2"
    d="M65,155 C80,120 100,85 110,40"/>
  <path class="peacock" stroke-width="1.2"
    d="M60,155 C70,120 75,85 75,40"/>
  <path class="peacock" stroke-width="1.2"
    d="M55,158 C55,125 50,90 40,55"/>
  <path class="peacock" stroke-width="1.2"
    d="M50,162 C40,135 25,110 15,75"/>

  <!-- Feather eye decorations (mehndi style) -->
  <!-- On first feather -->
  <ellipse class="pfill" cx="120" cy="85" rx="6" ry="8" transform="rotate(-30,120,85)"/>
  <ellipse fill="#FDF6ED" cx="120" cy="85" rx="3" ry="4" transform="rotate(-30,120,85)"/>
  <ellipse class="pfill" cx="120" cy="85" rx="1.5" ry="2" transform="rotate(-30,120,85)"/>
  <!-- Feather fronds -->
  <path class="peacock" stroke-width="0.8" d="M114,80 C108,75 105,68 108,62"/>
  <path class="peacock" stroke-width="0.8" d="M126,80 C132,75 135,68 132,62"/>
  <path class="peacock" stroke-width="0.8" d="M118,77 C116,70 116,62 118,56"/>
  <path class="peacock" stroke-width="0.8" d="M122,77 C124,70 124,62 122,56"/>

  <!-- On second feather -->
  <ellipse class="pfill" cx="100" cy="65" rx="5" ry="7" transform="rotate(-15,100,65)"/>
  <ellipse fill="#FDF6ED" cx="100" cy="65" rx="2.5" ry="3.5" transform="rotate(-15,100,65)"/>
  <ellipse class="pfill" cx="100" cy="65" rx="1.2" ry="1.7" transform="rotate(-15,100,65)"/>
  <path class="peacock" stroke-width="0.7" d="M95,60 C90,55 88,48 91,42"/>
  <path class="peacock" stroke-width="0.7" d="M105,60 C110,55 112,48 109,42"/>

  <!-- On third feather -->
  <ellipse class="pfill" cx="74" cy="68" rx="5" ry="7" transform="rotate(0,74,68)"/>
  <ellipse fill="#FDF6ED" cx="74" cy="68" rx="2.5" ry="3.5" transform="rotate(0,74,68)"/>
  <ellipse class="pfill" cx="74" cy="68" rx="1.2" ry="1.7" transform="rotate(0,74,68)"/>
  <path class="peacock" stroke-width="0.7" d="M69,63 C66,57 66,50 70,44"/>
  <path class="peacock" stroke-width="0.7" d="M79,63 C82,57 82,50 78,44"/>

  <!-- On fourth feather -->
  <ellipse class="pfill" cx="45" cy="80" rx="5" ry="7" transform="rotate(20,45,80)"/>
  <ellipse fill="#FDF6ED" cx="45" cy="80" rx="2.5" ry="3.5" transform="rotate(20,45,80)"/>
  <ellipse class="pfill" cx="45" cy="80" rx="1.2" ry="1.7" transform="rotate(20,45,80)"/>

  <!-- Floral elements on feathers -->
  <g transform="translate(130,50)">
    <path class="pfill" d="M0,0 C-3,-5 -2,-9 0,-8 C2,-9 3,-5 0,0Z"/>
    <path class="pfill" d="M0,0 C5,-3 9,-2 8,0 C9,2 5,3 0,0Z"/>
    <path class="pfill" d="M0,0 C3,5 2,9 0,8 C-2,9 -3,5 0,0Z"/>
    <path class="pfill" d="M0,0 C-5,3 -9,2 -8,0 C-9,-2 -5,-3 0,0Z"/>
    <circle class="pgold" cx="0" cy="0" r="2.5"/>
  </g>

  <g transform="translate(55,40)">
    <path class="pfill" d="M0,0 C-2,-4 -1,-7 0,-6 C1,-7 2,-4 0,0Z"/>
    <path class="pfill" d="M0,0 C4,-2 7,-1 6,0 C7,1 4,2 0,0Z"/>
    <path class="pfill" d="M0,0 C2,4 1,7 0,6 C-1,7 -2,4 0,0Z"/>
    <path class="pfill" d="M0,0 C-4,2 -7,1 -6,0 C-7,-1 -4,-2 0,0Z"/>
    <circle class="pgold" cx="0" cy="0" r="2"/>
  </g>

  <!-- Body of peacock -->
  <ellipse cx="68" cy="165" rx="18" ry="22" fill="#3D1F0D" stroke="#3D1F0D" stroke-width="1"/>

  <!-- Wing detail -->
  <path class="pfill" d="M52,158 C56,148 62,142 68,145 C74,148 76,158 72,168 Z"/>
  <!-- Wing feather lines -->
  <path class="peacock" stroke-width="0.8" d="M57,152 C60,148 65,147 68,150"/>
  <path class="peacock" stroke-width="0.8" d="M56,156 C59,152 64,151 67,154"/>
  <path class="peacock" stroke-width="0.8" d="M55,161 C58,157 63,156 66,159"/>

  <!-- Body decorative pattern -->
  <path fill="#C9960C" d="M60,162 C63,158 67,158 70,162 C67,160 63,160 60,162Z" opacity="0.6"/>
  <path fill="#C9960C" d="M63,167 C66,163 70,163 73,167 C70,165 66,165 63,167Z" opacity="0.5"/>

  <!-- Neck -->
  <path class="pfill" d="M68,143 C64,135 62,125 65,118 C68,125 70,135 72,143 Z"/>
  <!-- Neck decorations -->
  <path fill="#C9960C" d="M65,130 C66,127 68,127 70,130 C68,129 66,129 65,130Z" opacity="0.7"/>
  <path fill="#C9960C" d="M65,135 C66,132 68,132 70,135 C68,134 66,134 65,135Z" opacity="0.6"/>

  <!-- Head -->
  <circle class="pfill" cx="67" cy="113" r="12"/>
  <!-- Crown feathers -->
  <path class="pfill" d="M63,103 C62,97 63,92 64,88 C64,92 65,97 65,103Z"/>
  <path class="pfill" d="M67,101 C67,95 68,90 70,86 C69,90 69,95 68,101Z"/>
  <path class="pfill" d="M71,103 C72,97 74,93 77,90 C74,93 73,97 72,103Z"/>
  <!-- Crown tips -->
  <circle class="pgold" cx="64" cy="88" r="2.5"/>
  <circle class="pgold" cx="70" cy="86" r="2.5"/>
  <circle class="pgold" cx="77" cy="90" r="2.5"/>
  <!-- Beak -->
  <path class="pfill" d="M77,113 C82,111 86,113 84,116 C82,117 78,116 77,113Z"/>
  <!-- Eye -->
  <circle fill="#FDF6ED" cx="74" cy="111" r="3.5"/>
  <circle class="pfill" cx="74.5" cy="111" r="2"/>
  <circle fill="#FDF6ED" cx="75" cy="110.5" r="0.8"/>
  <!-- Eye ring -->
  <circle fill="none" stroke="#C9960C" stroke-width="0.8" cx="74" cy="111" r="4.5"/>

  <!-- Legs -->
  <path class="peacock" stroke-width="2" d="M62,187 L58,198"/>
  <path class="peacock" stroke-width="2" d="M74,187 L78,198"/>
  <!-- Feet -->
  <path class="peacock" stroke-width="1.5" d="M58,198 L53,198 M58,198 L55,200 M58,198 L58,200"/>
  <path class="peacock" stroke-width="1.5" d="M78,198 L83,198 M78,198 L81,200 M78,198 L78,200"/>

  <!-- Decorative mehndi dots around -->
  <circle class="pfill" cx="140" cy="45" r="1.5"/>
  <circle class="pfill" cx="108" cy="35" r="1.5"/>
  <circle class="pfill" cx="72" cy="32" r="1.5"/>
  <circle class="pfill" cx="35" cy="65" r="1.5"/>
  <circle class="pfill" cx="20" cy="90" r="1.5"/>
</svg>
