<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      .m { fill: none; stroke: #C9960C; stroke-opacity: 0.08; }
      .mf { fill: #C9960C; fill-opacity: 0.05; stroke: none; }
    </style>
  </defs>

  <g transform="translate(300,300)">
    <!-- Outermost ring of petals -->
    <g>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(0)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(30)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(60)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(90)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(120)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(150)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(180)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(210)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(240)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(270)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(300)"/>
      <path class="mf" d="M0,-280 C20,-260 20,-240 0,-220 C-20,-240 -20,-260 0,-280Z" transform="rotate(330)"/>
    </g>

    <!-- Circles -->
    <circle class="m" stroke-width="1.5" r="270"/>
    <circle class="m" stroke-width="1" r="240"/>
    <circle class="m" stroke-width="1.5" r="210"/>
    <circle class="m" stroke-width="1" r="180"/>
    <circle class="m" stroke-width="1.5" r="150"/>
    <circle class="m" stroke-width="1" r="120"/>
    <circle class="m" stroke-width="1.5" r="90"/>
    <circle class="m" stroke-width="1" r="60"/>
    <circle class="m" stroke-width="1.5" r="30"/>

    <!-- Spokes (12 directions) -->
    <line class="m" stroke-width="0.8" x1="0" y1="-270" x2="0" y2="270"/>
    <line class="m" stroke-width="0.8" x1="-270" y1="0" x2="270" y2="0"/>
    <line class="m" stroke-width="0.8" x1="-191" y1="-191" x2="191" y2="191"/>
    <line class="m" stroke-width="0.8" x1="191" y1="-191" x2="-191" y2="191"/>
    <line class="m" stroke-width="0.5" x1="-70" y1="-262" x2="70" y2="262"/>
    <line class="m" stroke-width="0.5" x1="70" y1="-262" x2="-70" y2="262"/>
    <line class="m" stroke-width="0.5" x1="-262" y1="-70" x2="262" y2="70"/>
    <line class="m" stroke-width="0.5" x1="-262" y1="70" x2="262" y2="-70"/>
    <line class="m" stroke-width="0.5" x1="-135" y1="-234" x2="135" y2="234"/>
    <line class="m" stroke-width="0.5" x1="135" y1="-234" x2="-135" y2="234"/>
    <line class="m" stroke-width="0.5" x1="-234" y1="-135" x2="234" y2="135"/>
    <line class="m" stroke-width="0.5" x1="-234" y1="135" x2="234" y2="-135"/>

