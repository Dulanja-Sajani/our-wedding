    <!-- Ring at r=210 -->
    <g>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(0)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(22.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(45)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(67.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(90)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(112.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(135)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(157.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(180)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(202.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(225)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(247.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(270)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(292.5)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(315)"/>
      <path class="mf" d="M0,-210 C15,-195 15,-180 0,-165 C-15,-180 -15,-195 0,-210Z" transform="rotate(337.5)"/>
    </g>

    <!-- Ring at r=150 -->
    <g>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(0)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(30)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(60)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(90)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(120)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(150)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(180)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(210)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(240)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(270)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(300)"/>
      <path class="mf" d="M0,-150 C12,-138 12,-126 0,-114 C-12,-126 -12,-138 0,-150Z" transform="rotate(330)"/>
    </g>

    <!-- Ring at r=90 -->
    <g>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(0)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(30)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(60)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(90)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(120)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(150)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(180)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(210)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(240)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(270)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(300)"/>
      <path class="mf" d="M0,-90 C8,-80 8,-72 0,-62 C-8,-72 -8,-80 0,-90Z" transform="rotate(330)"/>
    </g>

    <!-- Center lotus -->
    <g>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(0)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(45)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(90)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(135)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(180)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(225)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(270)"/>
      <path class="mf" d="M0,-28 C8,-20 8,-12 0,-4 C-8,-12 -8,-20 0,-28Z" transform="rotate(315)"/>
    </g>
    <circle class="m" stroke-width="1.5" r="8"/>
    <circle fill="#C9960C" fill-opacity="0.06" r="5"/>
