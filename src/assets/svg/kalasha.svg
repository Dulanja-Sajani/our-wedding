<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 110" width="90" height="110">
  <defs>
    <linearGradient id="potGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4AF37"/>
      <stop offset="40%" stop-color="#C9960C"/>
      <stop offset="100%" stop-color="#9A7209"/>
    </linearGradient>
    <linearGradient id="potShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,200,0)" />
      <stop offset="30%" stop-color="rgba(255,255,200,0.4)" />
      <stop offset="100%" stop-color="rgba(255,255,200,0)" />
    </linearGradient>
    <linearGradient id="neckGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9960C"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#C9960C"/>
    </linearGradient>
  </defs>

  <!-- Base/pedestal -->
  <rect x="28" y="98" width="34" height="6" rx="2" fill="url(#potGrad)" stroke="#3D1F0D" stroke-width="0.8"/>
  <rect x="24" y="103" width="42" height="5" rx="2" fill="#C9960C" stroke="#3D1F0D" stroke-width="0.8"/>

  <!-- Main pot body -->
  <path fill="url(#potGrad)" stroke="#3D1F0D" stroke-width="1.2"
    d="M25,96 C20,88 16,78 18,68 C20,56 22,50 22,46 C22,42 26,38 30,36 L60,36 C64,38 68,42 68,46 C68,50 70,56 72,68 C74,78 70,88 65,96 Z"/>

  <!-- Pot shine highlight -->
  <path fill="url(#potShine)" d="M32,38 C36,38 40,40 44,40 C44,60 44,80 44,96 C40,96 36,90 32,76 C28,62 28,50 32,38Z" opacity="0.6"/>

  <!-- Pot base ring -->
  <ellipse cx="45" cy="96" rx="20.5" ry="3" fill="#9A7209" stroke="#3D1F0D" stroke-width="0.8"/>

  <!-- Decorative band on pot - geometric pattern -->
  <g>
    <path fill="none" stroke="#3D1F0D" stroke-width="0.8" d="M20,70 C30,68 40,72 50,70 C60,68 68,70 72,70"/>
    <path fill="none" stroke="#3D1F0D" stroke-width="0.8" d="M19,74 C29,72 40,76 50,74 C61,72 69,74 73,74"/>
    <!-- Diamond row between bands -->
    <polygon fill="#3D1F0D" points="28,72 31,70 34,72 31,74" opacity="0.8"/>
    <polygon fill="#3D1F0D" points="40,72 43,70 46,72 43,74" opacity="0.8"/>
    <polygon fill="#3D1F0D" points="52,72 55,70 58,72 55,74" opacity="0.8"/>
    <polygon fill="#C9960C" points="29,72 31,70.5 33,72 31,73.5" opacity="0.6"/>
    <polygon fill="#C9960C" points="41,72 43,70.5 45,72 43,73.5" opacity="0.6"/>
    <polygon fill="#C9960C" points="53,72 55,70.5 57,72 55,73.5" opacity="0.6"/>
  </g>

  <!-- Upper band decoration -->
  <path fill="none" stroke="#3D1F0D" stroke-width="0.8" d="M22,55 C32,53 42,57 52,55 C62,53 68,55 70,55"/>
  <path fill="none" stroke="#3D1F0D" stroke-width="0.8" d="M22,58 C32,56 42,60 52,58 C62,56 68,58 70,58"/>

  <!-- Neck of pot -->
  <path fill="url(#neckGrad)" stroke="#3D1F0D" stroke-width="1.2"
    d="M30,36 C30,32 33,28 35,26 L55,26 C57,28 60,32 60,36 Z"/>

  <!-- Neck rings decoration -->
  <path fill="none" stroke="#3D1F0D" stroke-width="1" d="M29,31 L61,31"/>
  <path fill="none" stroke="#C9960C" stroke-width="0.6" d="M29,33 L61,33"/>

  <!-- Rim / mouth of pot -->
  <ellipse cx="45" cy="26" rx="12" ry="3.5" fill="#D4AF37" stroke="#3D1F0D" stroke-width="1.2"/>
  <ellipse cx="45" cy="25" rx="10" ry="2.5" fill="#C9960C" stroke="#3D1F0D" stroke-width="0.8"/>

  <!-- Coconut flower / palm fronds -->
  <g>
    <!-- Central stem -->
    <line x1="45" y1="25" x2="45" y2="10" stroke="#3D1F0D" stroke-width="1.5"/>
    <!-- Coconut -->
    <ellipse cx="45" cy="9" rx="5" ry="6" fill="#8B5E3C" stroke="#3D1F0D" stroke-width="1"/>
    <ellipse cx="45" cy="7" rx="3" ry="2" fill="#6B4226" opacity="0.6"/>
    <!-- Leaves fanning out -->
    <path fill="#3D1F0D" d="M45,10 C38,6 32,2 30,-2 C34,2 40,6 45,10Z" opacity="0.9"/>
    <path fill="#3D1F0D" d="M45,10 C52,6 58,2 60,-2 C56,2 50,6 45,10Z" opacity="0.9"/>
    <path fill="#3D1F0D" d="M45,10 C42,4 42,-2 44,-8 C44,-2 44,4 45,10Z" opacity="0.9"/>
    <path fill="#3D1F0D" d="M45,10 C35,8 28,10 24,14 C30,10 38,8 45,10Z" opacity="0.7"/>
    <path fill="#3D1F0D" d="M45,10 C55,8 62,10 66,14 C60,10 52,8 45,10Z" opacity="0.7"/>
    <!-- Mango leaves -->
    <path fill="#C9960C" d="M45,22 C40,20 36,16 37,13 C38,16 42,20 45,22Z" opacity="0.7"/>
    <path fill="#C9960C" d="M45,22 C50,20 54,16 53,13 C52,16 48,20 45,22Z" opacity="0.7"/>
    <path fill="#C9960C" d="M45,22 C43,18 42,14 44,11 C44,14 44,18 45,22Z" opacity="0.7"/>
  </g>

  <!-- Flames on top (auspicious fire) -->
  <path fill="#C9960C" d="M43,22 C41,19 40,16 42,14 C40,16 39,20 41,23Z" opacity="0.8"/>
  <path fill="#D4AF37" d="M45,20 C43,16 43,13 45,11 C47,13 47,16 45,20Z" opacity="0.9"/>
  <path fill="#C9960C" d="M47,22 C49,19 50,16 48,14 C50,16 51,20 49,23Z" opacity="0.8"/>
</svg>
