name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Sync guest list from Google Sheets
        run: node scripts/sync-guests.mjs
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}

      - name: Build
        run: npm run build
        env:
          VITE_RSVP_ENDPOINT: ${{ secrets.VITE_RSVP_ENDPOINT }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
